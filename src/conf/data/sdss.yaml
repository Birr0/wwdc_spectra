x_ds:
  dataset_name: "sdss"
  fp: ${meta.data_path}
  type: "spectra"
  augmentations: none #${..augmentations}
  size: 3921

y_catalog:
  catalog_name: "sdss"
  fp: null
  join_method: null
  variables:
    Z:
      name: "redshift"
      size: 1
      processing_fn: null
  drop_variables: []

loader:
  _target_: wwdc_spectra.data.modules.WWDCDataLoader
  datasets:
    train:
      _target_: wwdc_spectra.data.sdss.SDSS
      split: "train"
      x_ds: ${....x_ds}
      y_catalog: ${....y_catalog}
    val:
      _target_: wwdc_spectra.data.sdss.SDSS
      split: "val"
      x_ds: ${....x_ds}
      y_catalog: ${....y_catalog}
    test:
      _target_: wwdc_spectra.data.sdss.SDSS
      split: "test"
      x_ds: ${....x_ds}
      y_catalog: ${....y_catalog}
  batch_size: 512
  random_state: ${seed}
  shuffle: true
  num_workers: 24 #1 #0 # dynamically set in the python file

embedding_loader: # need to update this.
  _target_: wwdc_spectra.data.embeddings.EmbeddingDataLoader
  datasets:
    train:
      _target_: wwdc_spectra.data.embeddings.EmbeddingDataset
      embedding_dset_name: "spender-I-vf-0"
      catalog_dset_name: "spectra_catalog"
      split: "train"
      embed_type: "orig"
    val:
      _target_: wwdc_spectra.data.embeddings.EmbeddingDataset
      embedding_dset_name: "spender-I-vf-0"
      catalog_dset_name: "spectra_catalog"
      split: "val"
      embed_type: "orig"
    test:
      _target_: wwdc_spectra.data.embeddings.EmbeddingDataset
      embedding_dset_name: "spender-I-vf-0"
      catalog_dset_name: "spectra_catalog"
      split: "test"
      embed_type: "orig"
  batch_size: 16 #64
  val_split: 0.2
  random_state: ${seed}
  shuffle: true
  num_workers: 24 #null  #0 # dynamically set in the python file